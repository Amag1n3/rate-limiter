version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - RATE_LIMIT_STORE=redis
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis